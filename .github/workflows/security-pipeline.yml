name: Secure CI/CD Pipeline - AI Vulnerability Detection

on:
  pull_request:
    branches:
      - test          # Solo PR de dev → test
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MODEL_PATH: ../modelo/model_artifacts
  REPORT_PATH: ../reports/security_report.json

# ─────────────────────────────────────────────
# ETAPA 1 — Revisión de Seguridad con Modelo ML
# ─────────────────────────────────────────────
jobs:
  security-scan:
    name: "Etapa 1: Revisión de Seguridad con Modelo ML"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Solo ejecutar si el PR viene de la rama dev
    if: github.head_ref == 'dev'

    outputs:
      decision: ${{ steps.parse.outputs.decision }}
      risk: ${{ steps.parse.outputs.risk }}
      vulnerable_count: ${{ steps.parse.outputs.vulnerable_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        working-directory: ci
        run: |
          set -euo pipefail
          pip install --upgrade pip wheel
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      - name: Create dummy model if needed
        shell: bash
        run: |
          if [[ ! -f "modelo/model_artifacts/modelo_ensemble.joblib" ]]; then
            cd ci && python3 create_dummy_model.py || echo "No se pudo crear modelo dummy"
          else
            echo "✅ Model artifacts found"
          fi

      - name: Run AI vulnerability detection
        id: security
        shell: bash
        working-directory: ci
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_BRANCH: ${{ github.event.pull_request.base.sha }}
          HEAD_BRANCH: HEAD
          MODEL_PATH: ${{ env.MODEL_PATH }}
          REPORT_PATH: ${{ env.REPORT_PATH }}
        run: |
          set -euo pipefail
          python3 security_pipeline.py
          echo "PIPELINE_OK=true" >> "$GITHUB_ENV"

      - name: Parse report results
        id: parse
        shell: bash
        run: |
          REPORT="reports/security_report.json"
          if [[ -f "$REPORT" ]]; then
            DECISION=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r.get('summary',{}).get('overall_decision','UNKNOWN'))")
            RISK=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r.get('summary',{}).get('overall_risk_percentage',0))")
            VULN=$(python3 -c "import json; r=json.load(open('$REPORT')); print(r.get('summary',{}).get('vulnerable_count',0))")
          else
            DECISION="UNKNOWN"
            RISK="0"
            VULN="0"
          fi
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"
          echo "vulnerable_count=$VULN" >> "$GITHUB_OUTPUT"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis-report
          path: reports/security_report.json
          retention-days: 30
          if-no-files-found: warn

      - name: "Comentar PR: resultado detallado del análisis"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/security_report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('Reporte no encontrado');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const summary = report.summary || {};
            const decision = summary.overall_decision || 'UNKNOWN';
            const isVulnerable = decision === 'RECHAZAR';
            const icon = isVulnerable ? '🚫' : '✅';

            // Construir tabla de predicciones detalladas
            let detailRows = '';
            const preds = report.predictions || [];
            preds.forEach((p, i) => {
              if (p.prediction === 'VULNERABLE') {
                const prob = ((p.probability_vulnerable || 0) * 100).toFixed(1);
                const file = p.file || 'N/A';
                const line = p.line || 'N/A';
                const vtype = p.vulnerability_type || 'N/A';
                detailRows += `| ${file} | L${line} | ${vtype} | ${prob}% |\n`;
              }
            });

            // Vulnerabilidad types resumen
            let allVulnTypes = new Set();
            preds.forEach(p => {
              if (p.prediction === 'VULNERABLE' && p.vulnerability_types) {
                p.vulnerability_types.forEach(t => allVulnTypes.add(t));
              }
            });
            const vulnTypesStr = allVulnTypes.size > 0 ? [...allVulnTypes].join(', ') : 'N/A';

            let body = [
              `${icon} **Análisis de Seguridad con Modelo ML**`,
              '',
              '| Métrica | Valor |',
              '|---------|-------|',
              `| Fragmentos analizados | ${summary.total_fragments || 0} |`,
              `| Seguros | ${summary.safe_count || 0} |`,
              `| Vulnerables | ${summary.vulnerable_count || 0} |`,
              `| Tipo(s) detectado(s) | ${vulnTypesStr} |`,
              `| Nivel de riesgo | ${summary.overall_risk_percentage || 0}% |`,
              `| **Decisión** | **${decision}** |`,
            ].join('\n');

            if (detailRows) {
              body += '\n\n### 🔴 Vulnerabilidades Detectadas\n';
              body += '| Archivo | Línea | Tipo | Probabilidad |\n';
              body += '|---------|-------|------|--------------|\n';
              body += detailRows;
            }

            if (isVulnerable) {
              body += '\n\n> ⛔ **Este PR ha sido rechazado automáticamente. Se requiere corrección antes de continuar el pipeline.**';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: "Aplicar etiqueta y crear issue si VULNERABLE"
        if: steps.parse.outputs.decision == 'RECHAZAR'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const risk = '${{ steps.parse.outputs.risk }}';
            const vulnCount = '${{ steps.parse.outputs.vulnerable_count }}';

            // Crear etiqueta si no existe
            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'fixing-required',
                color: 'e11d48',
                description: 'Vulnerabilidad detectada - corrección obligatoria'
              });
            } catch (e) { /* etiqueta ya existe */ }

            // Aplicar etiqueta al PR
            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: pr,
              labels: ['fixing-required']
            });

            // Crear issue vinculada
            await github.rest.issues.create({
              owner, repo,
              title: `🔴 [SEGURIDAD] Vulnerabilidades detectadas en PR #${pr}`,
              body: [
                `## Vulnerabilidades detectadas por el pipeline de seguridad`,
                '',
                `**Pull Request:** #${pr}`,
                `**Commit:** ${{ github.sha }}`,
                `**Rama origen:** ${{ github.head_ref }}`,
                `**Fragmentos vulnerables:** ${vulnCount}`,
                `**Nivel de riesgo:** ${risk}%`,
                '',
                `> El merge ha sido bloqueado automáticamente. Revisa el [análisis completo](${{ github.event.pull_request.html_url }}) y corrige las vulnerabilidades antes de volver a abrir el PR.`,
              ].join('\n'),
              labels: ['fixing-required']
            });

      - name: "Bloquear merge si VULNERABLE"
        if: steps.parse.outputs.decision == 'RECHAZAR'
        run: |
          echo "❌ Pipeline detenido: código clasificado como VULNERABLE"
          exit 1

# ─────────────────────────────────────────────
# ETAPA 2 — Merge a test + Pruebas
# ─────────────────────────────────────────────
  merge-to-test-and-run-tests:
    name: "Etapa 2: Merge a test + Pruebas"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-scan
    if: needs.security-scan.outputs.decision != 'RECHAZAR'

    outputs:
      tests_passed: ${{ steps.test-result.outputs.tests_passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Merge automático dev → test"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin test
          git checkout test
          git merge origin/dev --no-ff -m "Auto-merge: dev → test (PR #${{ github.event.pull_request.number }}) [pipeline]"
          git push origin test
          echo "✅ Merge automático a test completado"

      - name: "Notificar Telegram: Merge a test realizado"
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "${TELEGRAM_BOT_TOKEN:-}" && -n "${TELEGRAM_CHAT_ID:-}" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="🔀 <b>Merge automático a test completado</b>%0A%0A<b>PR:</b> #${{ github.event.pull_request.number }}%0A<b>Repositorio:</b> ${{ github.repository }}%0A%0A⚙️ Ejecutando pruebas unitarias e integración..." || true
          fi

      - name: Detect app directory
        shell: bash
        run: |
          if [[ -f "Backend/Mueblerix/pom.xml" ]]; then
            echo "APP_DIR=Backend/Mueblerix" >> "$GITHUB_ENV"
          else
            echo "APP_DIR=Backend/Mueblerix" >> "$GITHUB_ENV"
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        id: maven-tests
        continue-on-error: true
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          mvn -B clean verify
          echo "MAVEN_OK=true" >> "$GITHUB_ENV"

      - name: Determine test result
        id: test-result
        shell: bash
        run: |
          if [[ "${MAVEN_OK:-false}" == "true" ]]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish JUnit test report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            ${{ env.APP_DIR }}/**/target/surefire-reports/*.xml
            ${{ env.APP_DIR }}/**/target/failsafe-reports/*.xml
          check_name: "Backend Test Results"
          comment_mode: "always"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            ${{ env.APP_DIR }}/**/target/surefire-reports/*.xml
            ${{ env.APP_DIR }}/**/target/failsafe-reports/*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: "Aplicar etiqueta tests-failed y notificar Telegram si pruebas fallan"
        if: steps.test-result.outputs.tests_passed == 'false'
        uses: actions/github-script@v7
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.issue.number;

            // Crear etiqueta si no existe
            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'tests-failed',
                color: 'f97316',
                description: 'Pruebas fallidas en rama test'
              });
            } catch (e) { /* ya existe */ }

            // Aplicar etiqueta
            await github.rest.issues.addLabels({ owner, repo, issue_number: pr, labels: ['tests-failed'] });

            // Comentar en PR
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: '❌ **Pruebas fallidas en rama `test`**\n\nLas pruebas unitarias/integración no pasaron. El pipeline ha sido detenido. Revisa los [reportes de prueba](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) y corrige los errores.'
            });

            // Notificar Telegram
            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;
            if (token && chatId) {
              const msg = `❌ <b>Pruebas Fallidas en rama test</b>\n\n<b>PR:</b> #${pr}\n<b>Repositorio:</b> ${{ github.repository }}\n\n⚠️ El pipeline fue detenido. Se requiere corrección.`;
              await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: 'HTML' })
              });
            }

      - name: "Notificar Telegram: pruebas exitosas"
        if: steps.test-result.outputs.tests_passed == 'true'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "${TELEGRAM_BOT_TOKEN:-}" && -n "${TELEGRAM_CHAT_ID:-}" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="✅ <b>Pruebas Exitosas en rama test</b>%0A%0A<b>PR:</b> #${{ github.event.pull_request.number }}%0A<b>Repositorio:</b> ${{ github.repository }}%0A%0A➡️ Procediendo con merge a main y despliegue..." || true
          fi

      - name: "Bloquear si pruebas fallaron"
        if: steps.test-result.outputs.tests_passed == 'false'
        run: |
          echo "❌ Pipeline detenido: pruebas fallidas"
          exit 1

# ─────────────────────────────────────────────
# ETAPA 3 — Merge a main + Despliegue
# ─────────────────────────────────────────────
  deploy-to-production:
    name: "Etapa 3: Merge a main + Despliegue en Producción"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: merge-to-test-and-run-tests
    if: needs.merge-to-test-and-run-tests.outputs.tests_passed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Merge automático test → main"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge origin/test --no-ff -m "Auto-merge: test → main (PR #${{ github.event.pull_request.number }}) [pipeline]"
          git push origin main
          echo "✅ Merge automático a main completado"

      - name: Detect app directory
        shell: bash
        run: |
          if [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            echo "APP_DIR=Backend/Mueblerix" >> "$GITHUB_ENV"
          else
            echo "APP_DIR=Backend/Mueblerix" >> "$GITHUB_ENV"
          fi

      - name: Compute image tag
        shell: bash
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker-build
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: ${{ secrets.DOCKERHUB_USERNAME != '' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/proyecto-p2-backend:${{ env.TAG }}

      - name: "Notificar Telegram: despliegue exitoso"
        if: steps.docker-build.outcome == 'success'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "${TELEGRAM_BOT_TOKEN:-}" && -n "${TELEGRAM_CHAT_ID:-}" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="🚀 <b>Despliegue en Producción Exitoso</b>%0A%0A<b>PR:</b> #${{ github.event.pull_request.number }}%0A<b>Repositorio:</b> ${{ github.repository }}%0A<b>Imagen:</b> ${{ secrets.DOCKERHUB_USERNAME }}/proyecto-p2-backend:${{ env.TAG }}%0A%0A✅ Pipeline completado exitosamente. El código está en producción." || true
          fi

      - name: "Notificar Telegram: despliegue fallido"
        if: steps.docker-build.outcome == 'failure'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "${TELEGRAM_BOT_TOKEN:-}" && -n "${TELEGRAM_CHAT_ID:-}" ]]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="❌ <b>Despliegue en Producción FALLIDO</b>%0A%0A<b>PR:</b> #${{ github.event.pull_request.number }}%0A<b>Repositorio:</b> ${{ github.repository }}%0A%0A⚠️ El merge a main fue exitoso pero el build de Docker falló. Revisa los logs en GitHub Actions." || true
          fi

      - name: "Comentar PR: despliegue completado"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.docker-build.outcome }}';
            const tag = '${{ env.TAG }}';
            const icon = outcome === 'success' ? '🚀' : '⚠️';
            const status = outcome === 'success' ? 'Despliegue exitoso en producción' : 'Merge a main exitoso, pero el build de Docker falló';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${icon} **${status}**\n\n| Campo | Valor |\n|-------|-------|\n| Tag | \`${tag}\` |\n| Rama | \`main\` |\n| Estado Docker | ${outcome} |`
            });
