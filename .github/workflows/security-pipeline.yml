name: Secure CI/CD Pipeline - AI Vulnerability Detection

on:
  pull_request:
    branches:
      - main
      - develop
      - test
    types:
      - opened
      - synchronize
      - reopened

  push:
    branches:
      - main
      - develop
      - test

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MODEL_PATH: modelo/model_artifacts
  REPORT_PATH: reports/security_report.json

jobs:
  detect-paths:
    name: Detect Project Structure
    runs-on: ubuntu-latest
    outputs:
      app_dir: ${{ env.APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect app directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "pom.xml" && -f "Dockerfile" ]]; then
            app_dir="."
          elif [[ -f "Mueblerix/pom.xml" && -f "Mueblerix/Dockerfile" ]]; then
            app_dir="Mueblerix"
          elif [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            app_dir="Backend/Mueblerix"
          else
            echo "⚠️ No se detectó directorio de app, usando Backend/Mueblerix por defecto"
            app_dir="Backend/Mueblerix"
          fi
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"
          echo "APP_DIR detectado: $app_dir"

  security-scan:
    name: Security Analysis with AI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-paths

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security pipeline dependencies
        shell: bash
        working-directory: ci
        run: |
          set -euo pipefail
          pip install --upgrade pip wheel
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      - name: Run AI vulnerability detection
        id: security
        shell: bash
        working-directory: ci
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 security_pipeline.py || {
            echo "SECURITY_FAILED=true" >> "$GITHUB_ENV"
            exit 1
          }
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-analysis-report
          path: reports/security_report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with security results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/security_report.json';
            
            if (!fs.existsSync(reportPath)) {
              console.log('Security report not found');
              return;
            }

            try {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const summary = report.summary || {};
              
              const decision = summary.overall_decision || 'UNKNOWN';
              const icon = decision === 'RECHAZAR' ? 'FAILED' : 'PASSED';
              
              const message = [
                '**Security Analysis with AI**',
                '',
                '| Metric | Value |',
                '|--------|-------|',
                '| Total Fragments | ' + (summary.total_fragments || 0) + ' |',
                '| Secure | ' + (summary.safe_count || 0) + ' |',
                '| Vulnerable | ' + (summary.vulnerable_count || 0) + ' |',
                '| Risk Level | ' + (summary.overall_risk_percentage || 0) + '% |',
                '| Decision | **' + decision + '** |',
                '',
                'Status: ' + icon
              ].join('\n');
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            } catch (error) {
              console.error('Error:', error);
            }

      - name: Security gate result
        if: env.SECURITY_FAILED == 'true'
        run: |
          echo "❌ Security gate failed"
          exit 1

  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: detect-paths

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (tests + build)
        working-directory: ${{ needs.detect-paths.outputs.app_dir }}
        shell: bash
        run: |
          set -euo pipefail
          mvn -B clean verify
          echo "✅ Tests passed"

      - name: Publish JUnit test report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            ${{ needs.detect-paths.outputs.app_dir }}/**/target/surefire-reports/*.xml
            ${{ needs.detect-paths.outputs.app_dir }}/**/target/failsafe-reports/*.xml
          check_name: "Backend Test Results"
          comment_mode: "always"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            ${{ needs.detect-paths.outputs.app_dir }}/**/target/surefire-reports/*.xml
            ${{ needs.detect-paths.outputs.app_dir }}/**/target/failsafe-reports/*.xml
          retention-days: 7
          if-no-files-found: ignore

  python-quality:
    name: Python Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        working-directory: ci
        run: |
          set -euo pipefail
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      - name: Run tests
        shell: bash
        working-directory: ci
        run: |
          set -euo pipefail
          if [[ -f "tests.py" ]]; then
            python3 tests.py || echo "⚠️ Some tests failed"
          fi

      - name: Format validation with black
        shell: bash
        working-directory: ci
        run: |
          pip install black > /dev/null 2>&1
          black --check *.py 2>/dev/null || echo "⚠️ Format issues detected"
          true

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-scan, backend-tests]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    permissions:
      contents: read

    steps:
      - name: Guard — DockerHub configured
        id: guard
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "⚠️ DockerHub secrets not configured. Skipping."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            app_dir="Backend/Mueblerix"
          else
            app_dir="Backend/Mueblerix"
          fi
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/secureframe-gallery-backend:${{ env.TAG }}
