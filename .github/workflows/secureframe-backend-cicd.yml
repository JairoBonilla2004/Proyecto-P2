name: secureframe-backend

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

env:
  # Forzar el uso seguro de Node 24 para evitar las advertencias de depreciación
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    runs-on: ubuntu-latest

    # Necesario para publicar el reporte como "check" visual en GitHub Actions.
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "pom.xml" && -f "Dockerfile" ]]; then
            app_dir="."
          elif [[ -f "Mueblerix/pom.xml" && -f "Mueblerix/Dockerfile" ]]; then
            app_dir="Mueblerix"
          elif [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            app_dir="Backend/Mueblerix"
          else
            echo "No se pudo detectar el directorio de la app (pom.xml/Dockerfile)." >&2
            exit 1
          fi
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"
          echo "Usando APP_DIR=$app_dir"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B clean verify

      - name: Publish JUnit test report
        if: >-
          always() &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          # Maven Surefire/Failsafe (incluye JUnit 5 / JUnit Platform) generan XML tipo JUnit.
          files: |
            ${{ env.APP_DIR }}/**/target/surefire-reports/*.xml
            ${{ env.APP_DIR }}/**/target/failsafe-reports/*.xml

      - name: Upload JUnit XML reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-reports
          path: |
            ${{ env.APP_DIR }}/**/target/surefire-reports/*.xml
            ${{ env.APP_DIR }}/**/target/failsafe-reports/*.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: SonarQube scan
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        working-directory: ${{ env.APP_DIR }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SONAR_TOKEN:-}" || -z "${SONAR_ORGANIZATION:-}" ]]; then
            echo "SonarCloud no configurado (faltan SONAR_TOKEN o SONAR_ORGANIZATION). Skipping."
            exit 0
          fi

          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.coverage.jacoco.xmlReportPaths="target/site/jacoco/jacoco.xml"

  docker:
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    outputs:
      # Exportamos solo el tag, ya que el nombre de la imagen lo reconstruirá GitOps sin 
      tag: ${{ steps.meta.outputs.tag }}

    permissions:
      contents: read

    steps:
      - name: Guard — DockerHub configured
        id: guard
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "DockerHub secrets no configurados. Skipping docker job."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect app directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "pom.xml" && -f "Dockerfile" ]]; then
            app_dir="."
          elif [[ -f "Mueblerix/pom.xml" && -f "Mueblerix/Dockerfile" ]]; then
            app_dir="Mueblerix"
          elif [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            app_dir="Backend/Mueblerix"
          else
            echo "No se pudo detectar el directorio de la app (pom.xml/Dockerfile)." >&2
            exit 1
          fi
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/secureframe-gallery-backend:${{ env.TAG }}

  gitops:
    runs-on: ubuntu-latest
    needs: docker
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    permissions:
      contents: read

    steps:
      - name: Guard — GitOps configured
        id: guard
        shell: bash
        env:
          GITOPS_REPO: ${{ vars.GITOPS_REPO }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GITOPS_REPO:-}" || -z "${GITOPS_TOKEN:-}" ]]; then
            echo "GitOps no configurado (faltan GITOPS_REPO o GITOPS_TOKEN). Failing job."
            exit 1
          fi

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: manifests

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Select overlay
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            overlay="prod"
          else
            overlay="prod"
          fi
          echo "OVERLAY=$overlay" >> "$GITHUB_ENV"

      - name: Update image tag in kustomization
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          set -euo pipefail
          overlay_dir="manifests/apps/secureframe-gallery/backend/overlays/${OVERLAY}"
          if [[ ! -d "$overlay_dir" ]]; then
            echo "No existe overlay_dir=$overlay_dir" >&2
            exit 1
          fi

          # Reconstruimos la firma de la imagen de forma segura sin pasar outputs bloqueados
          FULL_IMAGE="${DOCKERHUB_USERNAME}/secureframe-gallery-backend:${TAG}"

          pushd "$overlay_dir" >/dev/null
          kustomize edit set image jsbonilla2/secureframe-gallery-backend="${FULL_IMAGE}"
          popd >/dev/null

      - name: Commit and push
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          set -euo pipefail
          cd manifests

          if git diff --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          git add -A
          git commit -m "chore(gitops): bump backend image to ${DOCKERHUB_USERNAME}/secureframe-gallery-backend:${TAG}"
          git push
