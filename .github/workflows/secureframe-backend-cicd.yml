name: secureframe-backend

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "pom.xml" && -f "Dockerfile" ]]; then
            app_dir="."
          elif [[ -f "Mueblerix/pom.xml" && -f "Mueblerix/Dockerfile" ]]; then
            app_dir="Mueblerix"
          elif [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            app_dir="Backend/Mueblerix"
          else
            echo "No se pudo detectar el directorio de la app (pom.xml/Dockerfile)." >&2
            exit 1
          fi
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"
          echo "Usando APP_DIR=$app_dir"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B clean verify

      - name: SonarQube scan
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        working-directory: ${{ env.APP_DIR }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SONAR_TOKEN:-}" || -z "${SONAR_ORGANIZATION:-}" ]]; then
            echo "SonarCloud no configurado (faltan SONAR_TOKEN o SONAR_ORGANIZATION). Skipping."
            exit 0
          fi

          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY"

  docker:
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — DockerHub configured
        id: guard
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" || -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "DockerHub secrets no configurados (DOCKERHUB_USERNAME/DOCKERHUB_TOKEN). Skipping docker job."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Detect app directory
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "pom.xml" && -f "Dockerfile" ]]; then
            app_dir="."
          elif [[ -f "Mueblerix/pom.xml" && -f "Mueblerix/Dockerfile" ]]; then
            app_dir="Mueblerix"
          elif [[ -f "Backend/Mueblerix/pom.xml" && -f "Backend/Mueblerix/Dockerfile" ]]; then
            app_dir="Backend/Mueblerix"
          else
            echo "No se pudo detectar el directorio de la app (pom.xml/Dockerfile)." >&2
            exit 1
          fi
          echo "APP_DIR=$app_dir" >> "$GITHUB_ENV"

      - name: Compute image name and tag
        id: meta
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          image_name="secureframe-gallery-backend"
          image="$DOCKERHUB_USERNAME/$image_name"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "IMAGE=$image" >> "$GITHUB_ENV"
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: steps.guard.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.guard.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: steps.guard.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.guard.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}

  gitops:
    runs-on: ubuntu-latest
    needs: docker
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) &&
      needs.docker.outputs.image != '' &&
      needs.docker.outputs.tag != ''

    permissions:
      contents: read

    steps:
      - name: Guard — GitOps configured
        id: guard
        shell: bash
        env:
          GITOPS_REPO: ${{ vars.GITOPS_REPO }}
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GITOPS_REPO:-}" || -z "${GITOPS_TOKEN:-}" ]]; then
            echo "GitOps no configurado (faltan GITOPS_REPO o GITOPS_TOKEN). Skipping gitops job."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout manifests repo
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: manifests

      - name: Set up kustomize
        if: steps.guard.outputs.enabled == 'true'
        uses: imranismail/setup-kustomize@v2

      - name: Select overlay
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            overlay="dev"
          else
            overlay="prod"
          fi
          echo "OVERLAY=$overlay" >> "$GITHUB_ENV"

      - name: Update image tag in kustomization
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          set -euo pipefail
          overlay_dir="manifests/apps/secureframe-gallery/backend/overlays/${OVERLAY}"
          if [[ ! -d "$overlay_dir" ]]; then
            echo "No existe overlay_dir=$overlay_dir" >&2
            exit 1
          fi

          pushd "$overlay_dir" >/dev/null
          kustomize edit set image jsbonilla2/secureframe-gallery-backend="${IMAGE}:${TAG}"
          popd >/dev/null

      - name: Commit and push
        if: steps.guard.outputs.enabled == 'true'
        shell: bash
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
          TAG: ${{ needs.docker.outputs.tag }}
        run: |
          set -euo pipefail
          cd manifests

          if git diff --quiet; then
            echo "No hay cambios que commitear."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(gitops): bump backend image to ${IMAGE}:${TAG}"
          git push
